version: '3.8'
services:
  db:
    image: mysql:latest
    container_name: mysql-server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123#
      MYSQL_DATABASE: mydb
      MYSQL_USER: deyo
      MYSQL_PASSWORD: root123#
    ports:
      - "3306:3306" 
    # command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    volumes:
      - ${PERSIST_STORAGE_PATH}/log/mysql:/usr/apps/log
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "9000:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root123#
    depends_on:
      - db
    networks:
      - app-network
volumes:
  mysql_data:
networks:
  app-network:
    driver: bridge